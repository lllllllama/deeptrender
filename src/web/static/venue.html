<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Analysis - DeepTrender</title>
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
</head>
<body data-i18n-title="venue.title">
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-text">DeepTrender</span>
        </div>
        <div class="nav-links">
            <a href="./index.html" class="nav-link" data-i18n="nav.home">Home</a>
            <a href="./venue.html" class="nav-link active" data-i18n="nav.venues">Venue Analysis</a>
            <a href="./trends.html" class="nav-link" data-i18n="nav.trends">Trend Tracking</a>
            <a href="./comparison.html" class="nav-link" data-i18n="nav.compare">Venue Comparison</a>
            <a href="./arxiv.html" class="nav-link" data-i18n="nav.arxiv">arXiv Trends</a>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" type="button" data-lang-switch="en" onclick="SiteI18n.switchLanguage('en')" data-i18n="lang.en">English</button>
            <button class="lang-btn" type="button" data-lang-switch="zh" onclick="SiteI18n.switchLanguage('zh')" data-i18n="lang.zh">Chinese</button>
        </div>
    </nav>

    <main class="container">
        <section class="venue-selector">
            <h1 id="venue-title" data-i18n="venue.heading">Select a venue</h1>
            <div class="venue-tabs" id="venue-tabs"></div>
        </section>

        <section class="stats-grid" id="venue-stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-content">
                    <div class="stat-value" id="venue-paper-count">--</div>
                    <div class="stat-label" data-i18n="venue.stat.papers">Total Papers</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-content">
                    <div class="stat-value" id="venue-year-count">--</div>
                    <div class="stat-label" data-i18n="venue.stat.years">Covered Years</div>
                </div>
            </div>
        </section>

        <section class="chart-card full-width" id="venue-wordcloud-section" style="display: none;">
            <div class="chart-header">
                <h3><span id="venue-cloud-title">Venue</span> <span data-i18n="venue.cloud">Keyword Cloud</span></h3>
            </div>
            <div class="chart-body" id="chart-venue-wordcloud" style="height: 450px;"></div>
        </section>

        <section class="charts-grid" id="venue-charts-section" style="display: none;">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 data-i18n="venue.papers">Papers by Year</h3>
                </div>
                <div class="chart-body" id="chart-yearly-papers"></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 data-i18n="venue.evolution">Keyword Evolution</h3>
                </div>
                <div class="chart-body" id="chart-keyword-evolution"></div>
            </div>
        </section>

        <section class="chart-card full-width" id="venue-table-section" style="display: none;">
            <div class="chart-header">
                <h3 data-i18n="venue.table">Yearly Top Keywords</h3>
            </div>
            <div class="table-container">
                <table class="data-table" id="yearly-keywords-table">
                    <thead>
                        <tr id="table-header"></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p data-i18n="footer.tagline">DeepTrender - AI paper keyword tracking and trend analytics</p>
    </footer>

    <script src="./static/js/site.js"></script>
    <script src="./static/js/toast.js"></script>
    <script src="./static/js/api.js"></script>
    <script src="./static/js/charts.js"></script>
    <script>
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const venueParam = params.get("venue");
            const overview = await API.getOverview();
            const tabs = document.getElementById("venue-tabs");

            tabs.innerHTML = overview.venues.map((venue) => `
                <button class="venue-tab ${venue === venueParam ? "active" : ""}" onclick="selectVenue('${venue}')">${venue}</button>
            `).join("");

            if (venueParam) {
                selectVenue(venueParam);
            }
        }

        async function selectVenue(venue) {
            document.querySelectorAll(".venue-tab").forEach((tab) => {
                tab.classList.toggle("active", tab.textContent === venue);
            });

            document.getElementById("venue-title").textContent = venue;
            document.getElementById("venue-title").dataset.fixedVenue = "true";
            document.getElementById("venue-cloud-title").textContent = venue;
            document.getElementById("venue-stats").style.display = "grid";
            document.getElementById("venue-wordcloud-section").style.display = "block";
            document.getElementById("venue-charts-section").style.display = "grid";
            document.getElementById("venue-table-section").style.display = "block";
            await loadVenueData(venue);
        }

        async function loadVenueData(venue) {
            const detail = await API.getVenueDetail(venue);
            document.getElementById("venue-paper-count").textContent = detail.total_papers.toLocaleString();
            document.getElementById("venue-year-count").textContent = detail.years.length;
            Charts.renderWordcloud("chart-venue-wordcloud", await API.getWordcloudData(venue, null, 100));
            renderYearlyPapers(detail.yearly_stats);
            Charts.renderTrendChart("chart-keyword-evolution", await API.getKeywordTrends([], venue));
            renderYearlyTable(detail.yearly_stats);
        }

        function renderYearlyPapers(yearlyStats) {
            const chart = Charts.init("chart-yearly-papers");
            const sorted = [...yearlyStats].sort((a, b) => a.year - b.year);

            chart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "category",
                    data: sorted.map((item) => item.year),
                    axisLine: { lineStyle: { color: "#30363d" } },
                    axisLabel: { color: "#8b949e" },
                },
                yAxis: {
                    type: "value",
                    axisLine: { lineStyle: { color: "#30363d" } },
                    axisLabel: { color: "#8b949e" },
                    splitLine: { lineStyle: { color: "#21262d" } },
                },
                series: [{
                    type: "bar",
                    data: sorted.map((item) => item.paper_count),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: "#667eea" },
                            { offset: 1, color: "#764ba2" },
                        ]),
                        borderRadius: [4, 4, 0, 0],
                    },
                }],
            });
        }

        function renderYearlyTable(yearlyStats) {
            const header = document.getElementById("table-header");
            const body = document.getElementById("table-body");
            const sorted = [...yearlyStats].sort((a, b) => b.year - a.year);

            header.innerHTML = `<th>${SiteI18n.t("venue.rank", "Rank")}</th>` + sorted.map((item) => `<th>${item.year}</th>`).join("");

            body.innerHTML = Array.from({ length: 10 }, (_, index) => {
                const cells = sorted.map((item) => `<td>${item.top_keywords[index]?.keyword || "-"}</td>`).join("");
                return `<tr><td>${index + 1}</td>${cells}</tr>`;
            }).join("");
        }

        document.addEventListener("DOMContentLoaded", init);
        document.addEventListener("deeptrender:language-changed", () => {
            const title = document.getElementById("venue-title");
            if (!title.dataset.fixedVenue) {
                title.textContent = SiteI18n.t("venue.heading", "Select a venue");
            }
            const header = document.getElementById("table-header");
            if (header.children.length > 0) {
                header.children[0].textContent = SiteI18n.t("venue.rank", "Rank");
            }
        });
    </script>
</body>
</html>
