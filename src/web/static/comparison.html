<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Comparison - DeepTrender</title>
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body data-i18n-title="comparison.title">
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-text">DeepTrender</span>
        </div>
        <div class="nav-links">
            <a href="./index.html" class="nav-link" data-i18n="nav.home">Home</a>
            <a href="./venue.html" class="nav-link" data-i18n="nav.venues">Venue Analysis</a>
            <a href="./trends.html" class="nav-link" data-i18n="nav.trends">Trend Tracking</a>
            <a href="./comparison.html" class="nav-link active" data-i18n="nav.compare">Venue Comparison</a>
            <a href="./arxiv.html" class="nav-link" data-i18n="nav.arxiv">arXiv Trends</a>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" type="button" data-lang-switch="en" onclick="SiteI18n.switchLanguage('en')" data-i18n="lang.en">English</button>
            <button class="lang-btn" type="button" data-lang-switch="zh" onclick="SiteI18n.switchLanguage('zh')" data-i18n="lang.zh">Chinese</button>
        </div>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1 data-i18n="comparison.heading">Venue Comparison</h1>
            <p data-i18n="comparison.subheading">Compare keyword distributions across venues.</p>
        </section>

        <section class="filter-bar">
            <div class="filter-group">
                <label for="compare-year" data-i18n="comparison.year">Year</label>
                <select id="compare-year" class="filter-select"></select>
            </div>
        </section>

        <section class="chart-card full-width">
            <div class="chart-header">
                <h3 data-i18n="comparison.chart">Keyword Distribution Comparison</h3>
            </div>
            <div class="chart-body" id="chart-radar" style="height: 500px;"></div>
        </section>

        <section class="comparison-grid" id="comparison-grid"></section>
    </main>

    <footer class="footer">
        <p data-i18n="footer.tagline">DeepTrender - AI paper keyword tracking and trend analytics</p>
    </footer>

    <script src="./static/js/site.js"></script>
    <script src="./static/js/toast.js"></script>
    <script src="./static/js/api.js"></script>
    <script src="./static/js/charts.js"></script>
    <script>
        async function init() {
            const overview = await API.getOverview();
            const yearSelect = document.getElementById("compare-year");
            const years = [...overview.years].sort((a, b) => b - a);

            years.forEach((year) => {
                const option = document.createElement("option");
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });

            yearSelect.addEventListener("change", loadComparison);
            if (years.length > 0) {
                loadComparison();
            }
        }

        async function loadComparison() {
            const year = parseInt(document.getElementById("compare-year").value, 10);
            const comparison = await API.getComparison(year, 15);
            Charts.renderComparisonRadar("chart-radar", comparison);
            renderComparisonGrid(comparison);
        }

        function renderComparisonGrid(comparison) {
            const grid = document.getElementById("comparison-grid");
            const venues = Object.keys(comparison.venues);

            grid.innerHTML = venues.map((venue) => {
                const keywords = comparison.venues[venue];
                const maxCount = keywords.length > 0 ? keywords[0].count : 1;

                return `
                    <div class="comparison-card">
                        <div class="comparison-header">
                            <h3>${venue}</h3>
                            <span class="comparison-year">${comparison.year}</span>
                        </div>
                        <div class="comparison-keywords">
                            ${keywords.slice(0, 10).map((keyword, index) => `
                                <div class="keyword-row">
                                    <span class="keyword-rank">${index + 1}</span>
                                    <span class="keyword-name">${keyword.keyword}</span>
                                    <div class="keyword-bar-container">
                                        <div class="keyword-bar" style="width: ${(keyword.count / maxCount) * 100}%"></div>
                                    </div>
                                    <span class="keyword-count">${keyword.count}</span>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
