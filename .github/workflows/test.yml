name: Test Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create required directories
        run: |
          mkdir -p data output/figures output/reports
          touch data/.gitkeep output/figures/.gitkeep output/reports/.gitkeep

      - name: Compile check
        run: |
          python -m compileall -q src

      - name: Run tests
        run: |
          set -o pipefail
          pytest tests/ -q --cov=src --cov-report=term-missing --cov-report=xml | tee pytest_output.txt

      - name: Test snapshot output
        if: always()
        run: |
          summary=$(grep -Eo '[0-9]+ passed.*' pytest_output.txt | tail -1 || true)
          echo "Pytest summary: ${summary:-summary not found}"
          python - <<'PY'
          from src.web.app import create_app
          app = create_app()
          client = app.test_client()
          for ep in ["/api/health", "/api/status"]:
              resp = client.get(ep)
              print(f"{ep}={resp.status_code}")
          PY

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Test pipeline (dry run)
        run: |
          python src/main.py --skip-ingestion --skip-structuring --limit 10 || {
            echo "Pipeline dry-run failed (non-critical for PR)"
            exit 0
          }

      - name: Verify output structure
        run: |
          echo "Checking output structure..."
          test -d data && echo "OK data/ exists" || echo "MISSING data/"
          test -d output && echo "OK output/ exists" || echo "MISSING output/"
          test -d output/figures && echo "OK output/figures exists" || echo "MISSING output/figures"
          test -d output/reports && echo "OK output/reports exists" || echo "MISSING output/reports"
